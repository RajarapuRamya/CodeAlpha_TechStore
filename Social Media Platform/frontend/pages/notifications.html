<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - ConnectHub</title>
    <link rel="stylesheet" href="../css/notifications.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="notifications-container">

    <h1 class="logo">ConnectHub</h1>

    <div class="notification-header">
        🔔
        <h2>Notifications</h2>
    </div>

    <div class="notification-card">
        <span>Sarah liked your post</span>

        <img class="mini-post"
        src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?w=800">
    </div>

    <div class="notification-card">
        <span>David started following you</span>

        <div>
            <button class="follow-btn">Follow</button>
            <button class="reject-btn">Reject</button>
        </div>
    </div>

    <div class="notification-card">
        <span>Emma commented on your post</span>

        <img class="mini-post"
        src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800">
    </div>

    <div class="notification-card">
        <span>Vinni started following you</span>

        <div>
            <button class="follow-btn">Follow</button>
            <button class="reject-btn">Reject</button>
        </div>
    </div>

    <div class="notification-card">
        <span>Khanji commented on your post</span>

        <img class="mini-post"
        src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800">
    </div>

    </div> 

</body>
</html>
