<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub - Login</title>
    <link rel="stylesheet" href="../css/login.css">
<body>

    <header>
        <h2>ConnectHub</h2>
    </header>

    <div class="container">
        <div class="login-box">

            <h1>Login</h1>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <a href="#" class="forgot-password">
                    Forgot Password?
                </a>

                <button type="submit">
                    Login
                </button>

                <p class="register-link">
                    Don't have an account?
                    <a href="register.html">Register</a>
                </p>

                <p id="message"></p>

            </form>

        </div>
    </div>

    <script src="login.js"></script>

</body>
</html>
