<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectHub Profile</title>
<link rel="stylesheet" href="../css/profile.css">
</head>

<body>

<!-- Navbar -->

<nav class="navbar">

    <div class="logo">ConnectHub</div>

    <input
    type="text"
    id="searchInput"
    placeholder="Search users..."
    class="search-box">

    <div class="nav-right">

        <a href="edit-profile.html">
            <img src="../icons/edit-profile.png" class="nav-icon">
        </a>

        <a href="notifications.html">
            <img src="../icons/notification.png" class="nav-icon">
        </a>

       <img src="https://randomuser.me/api/portraits/men/32.jpg"
        class="mini-profile">

    </div>

</nav>

<!-- Profile -->

<section class="profile-section">

    
    <img src="https://randomuser.me/api/portraits/men/32.jpg">
    <h2>John Doe</h2>

    <p class="job">
        Frontend Developer
    </p>

    <div class="buttons">

        <button>❤️ Like</button>

        <button>💬 Comment</button>

    </div>

    <button id="followBtn" class="follow-btn">
        Follow
    </button>

    <div class="stats">

        <div>
            <h3>2.4K</h3>
            <p>Followers</p>
        </div>

        <div>
            <h3 id="followingCount">320</h3>
            <p>Following</p>
        </div>

    </div>

</section>

<!-- Posts -->

<section class="posts-section">

    <div class="post-header">

        <h2>
            Posts
            <span id="postCount">150</span>
        </h2>

        <div class="filters">

            <button onclick="showAll()">
                All
            </button>

            <button onclick="showImages()">
                Images
            </button>

            <button onclick="showVideos()">
                Videos
            </button>

        </div>

    </div>

    <!-- Upload -->

    <div class="upload-box">

        <input
        type="file"
        id="postFile">

        <button onclick="uploadPost()">
            Upload Post
        </button>

    </div>

    <!-- Gallery -->

    <div class="gallery" id="gallery">

        <img class="image-post"
        src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?w=800">

        <img class="image-post"
        src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800">

        <video controls class="video-post">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4">
        </video>

        <img class="image-post"
        src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800">

        <video controls class="video-post">
            <source src="https://www.w3schools.com/html/movie.mp4">
        </video>

        <img class="image-post"
        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800">

        <img class="image-post"
        src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=800">

        <video controls class="video-post">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4">
        </video>

    </div>

</section>

<script src="../js/profile.js"></script>

</body>
</html>
